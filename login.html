<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — AmexIvestment</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #0f4c81; --primary-dark: #0a3560; --primary-light: #1a6bb8;
            --accent: #00a896; --accent-light: #00d4b8; --gold: #c9a227;
            --dark: #0a1628; --text: #1e293b; --text-light: #64748b;
            --white: #ffffff; --gray-50: #f8fafc; --gray-100: #f1f5f9; --gray-200: #e2e8f0;
            --success: #10b981; --danger: #ef4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; color: var(--text); background: linear-gradient(135deg, var(--dark) 0%, var(--primary-dark) 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }

        .login-container { display: grid; grid-template-columns: 1fr 1fr; max-width: 1000px; width: 100%; background: white; border-radius: 24px; overflow: hidden; box-shadow: 0 50px 100px rgba(0,0,0,0.4); }
        .login-sidebar { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); padding: 60px 50px; color: white; display: flex; flex-direction: column; justify-content: center; }
        .login-sidebar .logo { display: flex; align-items: center; gap: 12px; margin-bottom: 40px; text-decoration: none; }
        .login-sidebar .logo-icon { width: 45px; height: 45px; background: rgba(255,255,255,0.2); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; font-size: 20px; }
        .login-sidebar .logo-text { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700; color: white; }
        .login-sidebar h2 { font-family: 'Playfair Display', serif; font-size: 36px; margin-bottom: 20px; }
        .login-sidebar p { color: rgba(255,255,255,0.8); line-height: 1.7; margin-bottom: 40px; }
        .stat-box { background: rgba(255,255,255,0.1); border-radius: 16px; padding: 25px; text-align: center; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); }
        .stat-box .number { font-size: 36px; font-weight: 800; color: var(--accent-light); }
        .stat-box .label { font-size: 14px; color: rgba(255,255,255,0.7); margin-top: 5px; }

        .login-form { padding: 60px 50px; display: flex; flex-direction: column; justify-content: center; }
        .login-form h1 { font-family: 'Playfair Display', serif; font-size: 32px; color: var(--dark); margin-bottom: 10px; }
        .login-form .subtitle { color: var(--text-light); margin-bottom: 35px; }
        .form-group { margin-bottom: 22px; }
        .form-group label { display: block; font-size: 14px; font-weight: 600; color: var(--dark); margin-bottom: 8px; }
        .form-group input { width: 100%; padding: 14px 16px; border: 2px solid var(--gray-200); border-radius: 12px; font-size: 15px; font-family: 'Inter', sans-serif; transition: all 0.3s; background: var(--gray-50); }
        .form-group input:focus { outline: none; border-color: var(--primary); background: white; box-shadow: 0 0 0 4px rgba(15, 76, 129, 0.1); }
        .form-options { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .remember-me { display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--text-light); cursor: pointer; }
        .remember-me input { width: auto; }
        .forgot-link { font-size: 14px; color: var(--primary); text-decoration: none; font-weight: 600; }
        .forgot-link:hover { text-decoration: underline; }
        .btn { padding: 14px 28px; border-radius: 10px; font-weight: 600; font-size: 15px; cursor: pointer; transition: all 0.3s ease; border: none; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; justify-content: center; }
        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-light)); color: white; box-shadow: 0 4px 15px rgba(15, 76, 129, 0.3); width: 100%; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(15, 76, 129, 0.4); }
        .divider { display: flex; align-items: center; gap: 15px; margin: 25px 0; color: var(--text-light); font-size: 14px; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--gray-200); }
        .social-login { display: flex; gap: 10px; }
        .social-btn { flex: 1; padding: 12px; border: 2px solid var(--gray-200); border-radius: 10px; background: white; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: 500; }
        .social-btn:hover { border-color: var(--primary); background: var(--gray-50); }
        .register-link { text-align: center; margin-top: 25px; color: var(--text-light); font-size: 15px; }
        .register-link a { color: var(--primary); text-decoration: none; font-weight: 600; }

        @media (max-width: 900px) {
            .login-container { grid-template-columns: 1fr; }
            .login-sidebar { display: none; }
            .login-form { padding: 40px 30px; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-sidebar">
            <a href="{{ url_for('index') }}" class="logo">
                <div class="logo-icon"><i class="fas fa-landmark"></i></div>
                <div class="logo-text">AmexIvestment</div>
            </a>
            <h2>Welcome Back</h2>
            <p>Sign in to manage your loans, track payments, and access your personalized dashboard.</p>
            <div class="stat-box">
                <div class="number">$2.4B+</div>
                <div class="label">Loans funded for our customers</div>
            </div>
        </div>
        <div class="login-form">
            <h1>Sign In</h1>
            <p class="subtitle">Access your AmexIvestment account</p>

            <form method="POST" action="{{ url_for('login') }}">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" placeholder="john@example.com" required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Enter your password" required>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" name="remember"> Remember me
                    </label>
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>

                <button type="submit" class="btn btn-primary"><i class="fas fa-sign-in-alt"></i> Sign In</button>
            </form>

            <div class="divider">or continue with</div>
            <div class="social-login">
                <button class="social-btn"><i class="fab fa-google" style="color: #DB4437;"></i> Google</button>
                <button class="social-btn"><i class="fab fa-apple" style="color: #000;"></i> Apple</button>
            </div>

            <div class="register-link">
                Don't have an account? <a href="{{ url_for('register') }}">Get Started</a>
            </div>
        </div>
    </div>
</body>
</html>
